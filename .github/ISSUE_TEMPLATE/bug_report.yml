name: Bug Report
description: Create a report to help us improve the plugin
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: strapi_version
    attributes:
      label: Strapi Version
      description: What version of Strapi are you using?
      placeholder: e.g., 5.46.0
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Plugin Version
      description: What version of Content Manager Organizer are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js Version
      description: What version of Node.js are you using?
      placeholder: e.g., 20.11.0
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database
      description: What database are you using?
      options:
        - SQLite
        - PostgreSQL
        - MySQL
        - MariaDB
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: A clear and concise description of what actually happened.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
